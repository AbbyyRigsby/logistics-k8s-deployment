apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: web
  name: web
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: web
  template:
    metadata:
      labels:
        io.kompose.service: web
    spec:
      initContainers:
        - name: migrate
          image: web
          imagePullPolicy: Never
          command: ["sh", "-c", "cd logisticsapi && python manage.py migrate"]
          envFrom:
            - secretRef:
                name: logistics-secret
          env:
            - name: DEBUG
              value: "1"
      containers:
        - name: web
          image: web
          imagePullPolicy: Never
          command: ["sh", "-c", "cd logisticsapi && python manage.py runserver 0.0.0.0:8000"]
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - secretRef:
                name: logistics-secret
          env:
            - name: DEBUG
              value: "1"
